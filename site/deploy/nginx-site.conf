server {
    listen 80;
    listen [::]:80;
    server_name metr-pod-klyuch.ru www.metr-pod-klyuch.ru;

    root /opt/projects/metr2-podkluch/site;
    index index.html;

    # Let's Encrypt acme challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Длинный кэш только для бинарных изображений
    location ~* \.(jpg|jpeg|png|webp|gif|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Никакого кэша для текстовых файлов — будут обновляться мгновенно при деплое
    location ~* \.(html|css|js|json|svg)$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        try_files $uri =404;
    }

    # SPA-style fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~ /\.(git|env) { deny all; return 404; }
}

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;
    root /opt/projects/metr2-podkluch/site;
    index index.html;
    location / { try_files $uri $uri/ /index.html; }
}
