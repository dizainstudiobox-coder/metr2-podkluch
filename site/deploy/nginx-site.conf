# Nginx конфиг для metr2-podkluch.
# Размещается в /etc/nginx/sites-available/metr2-podkluch и симлинком в sites-enabled.
# Server_name выставляется при подключении домена через certbot.

server {
    listen 80 default_server;
    server_name _;

    root /opt/projects/metr2-podkluch/site;
    index index.html;

    # Кеш статики
    location ~* \.(css|js|jpg|jpeg|png|svg|webp|gif|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Каталог проектов (JSON)
    location /data/ {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri =404;
    }

    # SPA-style fallback на index.html
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Скрыть служебные файлы
    location ~ /\.(git|env) { deny all; return 404; }
}
