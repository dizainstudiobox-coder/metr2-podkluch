# HTTP — отдаём сайт + отвечаем на certbot acme challenge
server {
    listen 80;
    listen [::]:80;
    server_name metr-pod-klyuch.ru www.metr-pod-klyuch.ru;

    root /opt/projects/metr2-podkluch/site;
    index index.html;

    # Let's Encrypt acme challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location ~* \.(css|js|jpg|jpeg|png|svg|webp|gif|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location /data/ {
        add_header Cache-Control "no-cache, must-revalidate";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~ /\.(git|env) { deny all; return 404; }
}

# По IP-адресу — всё ещё работает (закроем позже, когда HTTPS будет везде)
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    root /opt/projects/metr2-podkluch/site;
    index index.html;
    location / { try_files $uri $uri/ /index.html; }
}
