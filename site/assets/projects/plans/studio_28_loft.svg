<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800">
  <defs>
    <style>
      .wall { fill: #FFFFFF; stroke: #1A1A1A; stroke-width: 5; stroke-linejoin: miter; }
      .wall-inner { fill: #FFFFFF; stroke: #1A1A1A; stroke-width: 2.5; }
      .partition { stroke: #1A1A1A; stroke-width: 1.5; fill: none; stroke-dasharray: 6 6; }
      .door { fill: none; stroke: #1A1A1A; stroke-width: 1.5; }
      .fix { fill: none; stroke: #1A1A1A; stroke-width: 1.5; }
      .fur { fill: #F4EFEA; stroke: #1A1A1A; stroke-width: 1; }
      .lbl { font-family: Georgia, serif; font-size: 22px; fill: #1A1A1A; }
      .sub { font-family: Georgia, serif; font-size: 11px; fill: #C97B5A; letter-spacing: 0.5px; }
      .corp { font-family: Helvetica, Arial, sans-serif; font-size: 10px; letter-spacing: 2px; fill: #8B847C; }
    </style>
  </defs>
  <rect width="600" height="800" fill="#F4EFEA"/>
  <!-- outer wall: rectangle with bay on bottom -->
  <path class="wall" d="M 110 100 L 470 100 L 470 580 L 510 580 L 510 730 L 110 730 Z"/>
  <!-- bathroom in corner -->
  <line class="wall-inner" x1="110" y1="270" x2="240" y2="270"/>
  <line class="wall-inner" x1="240" y1="100" x2="240" y2="270"/>
  <!-- bathroom door -->
  <path class="door" d="M 240 215 a 45 45 0 0 0 -45 45"/>
  <line class="door" x1="240" y1="215" x2="240" y2="260"/>
  <!-- entry hallway partition (dashed) -->
  <line class="partition" x1="320" y1="100" x2="320" y2="350"/>
  <line class="partition" x1="240" y1="350" x2="510" y2="350"/>
  <!-- entry door top -->
  <path class="door" d="M 350 100 a 70 70 0 0 1 70 70"/>
  <line class="door" x1="350" y1="100" x2="350" y2="170"/>
  <!-- toilet -->
  <ellipse class="fix" cx="160" cy="160" rx="13" ry="18"/>
  <rect class="fix" x="148" y="140" width="26" height="13"/>
  <!-- sink -->
  <rect class="fix" x="130" y="215" width="48" height="32" rx="3"/>
  <!-- shower -->
  <rect class="fix" x="195" y="140" width="35" height="110" rx="2"/>
  <!-- kitchen along right wall (loft style with bar) -->
  <rect class="fur" x="355" y="155" width="100" height="55"/>
  <circle class="fix" cx="380" cy="183" r="7"/>
  <rect class="fix" x="410" y="170" width="40" height="30" rx="2"/>
  <!-- bar counter -->
  <rect class="fur" x="265" y="380" width="200" height="30"/>
  <line class="fix" x1="290" y1="395" x2="450" y2="395" stroke-dasharray="3 3"/>
  <!-- 2 stools -->
  <circle class="fur" cx="320" cy="435" r="12"/>
  <circle class="fur" cx="380" cy="435" r="12"/>
  <!-- sofa -->
  <rect class="fur" x="135" y="470" width="180" height="80" rx="3"/>
  <rect class="fix" x="145" y="478" width="55" height="60" rx="2"/>
  <rect class="fix" x="205" y="478" width="55" height="60" rx="2"/>
  <rect class="fix" x="263" y="478" width="40" height="60" rx="2"/>
  <!-- bed sleeping zone behind shelf -->
  <line class="partition" x1="135" y1="580" x2="470" y2="580"/>
  <rect class="fur" x="155" y="610" width="160" height="100" rx="3"/>
  <rect class="fix" x="170" y="630" width="60" height="20"/>
  <rect class="fix" x="240" y="630" width="60" height="20"/>
  <!-- shelving (vertical divider) -->
  <rect class="fur" x="330" y="600" width="20" height="120"/>
  <line class="fix" x1="330" y1="640" x2="350" y2="640"/>
  <line class="fix" x1="330" y1="680" x2="350" y2="680"/>
  <!-- window south -->
  <line class="fix" x1="130" y1="730" x2="490" y2="730" stroke-width="2"/>
  <!-- labels -->
  <text class="lbl" x="175" y="320" text-anchor="middle">4.10 м²</text>
  <text class="sub" x="175" y="337" text-anchor="middle">САНУЗЕЛ</text>
  <text class="lbl" x="380" y="290" text-anchor="middle">3.40 м²</text>
  <text class="sub" x="380" y="307" text-anchor="middle">ПРИХОЖАЯ</text>
  <text class="lbl" x="390" y="335" text-anchor="middle">9.80 м²</text>
  <text class="sub" x="390" y="352" text-anchor="middle">КУХНЯ</text>
  <text class="lbl" x="220" y="430" text-anchor="middle">10.70 м²</text>
  <text class="sub" x="220" y="446" text-anchor="middle">ГОСТИНАЯ-СПАЛЬНЯ</text>
  <text class="corp" x="300" y="765" text-anchor="middle">КОРПУС 1.2 · СТУДИЯ 28.0 м² · «Метр² Под Ключ»</text>
</svg>
