<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800">
  <defs>
    <style>
      .wall { fill: #FFFFFF; stroke: #1A1A1A; stroke-width: 5; stroke-linejoin: miter; }
      .wall-inner { fill: #FFFFFF; stroke: #1A1A1A; stroke-width: 2.5; }
      .partition { stroke: #1A1A1A; stroke-width: 1.5; fill: none; stroke-dasharray: 6 6; }
      .door { fill: none; stroke: #1A1A1A; stroke-width: 1.5; }
      .fix { fill: none; stroke: #1A1A1A; stroke-width: 1.5; }
      .fur { fill: #F4EFEA; stroke: #1A1A1A; stroke-width: 1; }
      .lbl { font-family: Georgia, serif; font-size: 22px; fill: #1A1A1A; }
      .sub { font-family: Georgia, serif; font-size: 11px; fill: #C97B5A; letter-spacing: 0.5px; }
      .corp { font-family: Helvetica, Arial, sans-serif; font-size: 10px; letter-spacing: 2px; fill: #8B847C; }
    </style>
  </defs>
  <rect width="600" height="800" fill="#F4EFEA"/>
  <!-- outer wall: rectangle wider, corner with bay -->
  <path class="wall" d="M 100 100 L 470 100 L 470 540 L 520 540 L 520 720 L 100 720 Z"/>
  <!-- vestibule + bathroom corner -->
  <line class="wall-inner" x1="100" y1="280" x2="290" y2="280"/>
  <line class="wall-inner" x1="290" y1="100" x2="290" y2="280"/>
  <line class="wall-inner" x1="170" y1="100" x2="170" y2="280"/>
  <!-- entry door -->
  <path class="door" d="M 350 100 a 70 70 0 0 1 70 70"/>
  <line class="door" x1="350" y1="100" x2="350" y2="170"/>
  <!-- vestibule door -->
  <path class="door" d="M 170 230 a 50 50 0 0 1 50 50"/>
  <line class="door" x1="170" y1="230" x2="170" y2="280"/>
  <!-- bathroom door -->
  <path class="door" d="M 290 220 a 50 50 0 0 0 -50 50"/>
  <line class="door" x1="290" y1="220" x2="290" y2="270"/>
  <!-- vestibule (entry hall) details: wardrobe -->
  <rect class="fur" x="110" y="150" width="55" height="125"/>
  <line class="fix" x1="110" y1="180" x2="165" y2="180" stroke-dasharray="2 3"/>
  <line class="fix" x1="110" y1="220" x2="165" y2="220" stroke-dasharray="2 3"/>
  <!-- bath: tub, sink, toilet -->
  <rect class="fix" x="180" y="135" width="100" height="50" rx="20"/>
  <ellipse class="fix" cx="215" cy="220" rx="14" ry="20"/>
  <rect class="fix" x="200" y="195" width="30" height="13"/>
  <rect class="fix" x="240" y="200" width="45" height="30" rx="3"/>
  <!-- kitchen along top right wall -->
  <rect class="fur" x="305" y="145" width="155" height="55"/>
  <rect class="fix" x="320" y="158" width="35" height="32" rx="2"/>
  <circle class="fix" cx="385" cy="173" r="7"/>
  <rect class="fix" x="420" y="155" width="35" height="40" rx="2"/>
  <!-- dining table -->
  <rect class="fur" x="320" y="280" width="120" height="70" rx="3"/>
  <circle class="fur" cx="305" cy="315" r="14"/>
  <circle class="fur" cx="455" cy="315" r="14"/>
  <!-- sleeping zone (large bed under window) -->
  <rect class="fur" x="140" y="350" width="160" height="200" rx="3"/>
  <rect class="fix" x="155" y="365" width="65" height="25" rx="2"/>
  <rect class="fix" x="225" y="365" width="65" height="25" rx="2"/>
  <!-- armchair near window -->
  <rect class="fur" x="370" y="420" width="80" height="80" rx="6"/>
  <rect class="fix" x="385" y="430" width="50" height="60" rx="4"/>
  <!-- bay window area -->
  <line class="fix" x1="470" y1="540" x2="520" y2="540"/>
  <line class="fix" x1="470" y1="720" x2="520" y2="720"/>
  <rect class="fur" x="475" y="555" width="40" height="120" rx="2"/>
  <!-- window south -->
  <line class="fix" x1="120" y1="720" x2="490" y2="720" stroke-width="2"/>
  <!-- partition between hall and living -->
  <line class="partition" x1="220" y1="280" x2="220" y2="320"/>
  <line class="partition" x1="220" y1="320" x2="450" y2="320"/>
  <!-- labels -->
  <text class="lbl" x="140" y="225" text-anchor="middle">3.20 м²</text>
  <text class="sub" x="140" y="240" text-anchor="middle">ТАМБУР</text>
  <text class="lbl" x="230" y="263" text-anchor="middle">4.50 м²</text>
  <text class="sub" x="230" y="280" text-anchor="middle">САНУЗЕЛ</text>
  <text class="lbl" x="385" y="260" text-anchor="middle">10.5 м²</text>
  <text class="sub" x="385" y="277" text-anchor="middle">КУХНЯ-СТОЛОВАЯ</text>
  <text class="lbl" x="270" y="465" text-anchor="middle">11.8 м²</text>
  <text class="sub" x="270" y="482" text-anchor="middle">СПАЛЬНЯ-ГОСТИНАЯ</text>
  <text class="corp" x="300" y="755" text-anchor="middle">КОРПУС 1.1 · СТУДИЯ 30.0 м² · «Метр² Под Ключ»</text>
</svg>
