<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 800">
  <defs>
    <style>
      .wall { fill: #FFFFFF; stroke: #1A1A1A; stroke-width: 5; stroke-linejoin: miter; }
      .wall-inner { fill: #FFFFFF; stroke: #1A1A1A; stroke-width: 2.5; }
      .partition { stroke: #1A1A1A; stroke-width: 1.5; fill: none; stroke-dasharray: 6 6; }
      .door { fill: none; stroke: #1A1A1A; stroke-width: 1.5; }
      .fix { fill: none; stroke: #1A1A1A; stroke-width: 1.5; }
      .fur { fill: #F4EFEA; stroke: #1A1A1A; stroke-width: 1; }
      .lbl { font-family: Georgia, serif; font-size: 22px; fill: #1A1A1A; }
      .sub { font-family: Georgia, serif; font-size: 11px; fill: #C97B5A; letter-spacing: 0.5px; }
      .corp { font-family: Helvetica, Arial, sans-serif; font-size: 10px; letter-spacing: 2px; fill: #8B847C; }
    </style>
  </defs>
  <rect width="600" height="800" fill="#F4EFEA"/>
  <!-- outer wall: L-shape -->
  <path class="wall" d="M 150 110 L 380 110 L 380 180 L 450 180 L 450 720 L 150 720 Z"/>
  <!-- entry door arc -->
  <path class="door" d="M 230 110 a 60 60 0 0 1 60 60"/>
  <line class="door" x1="230" y1="110" x2="230" y2="170"/>
  <!-- inner wall: bathroom partition -->
  <line class="wall-inner" x1="280" y1="110" x2="280" y2="270"/>
  <line class="wall-inner" x1="280" y1="270" x2="150" y2="270"/>
  <!-- bathroom door -->
  <path class="door" d="M 280 220 a 40 40 0 0 0 -40 40"/>
  <line class="door" x1="280" y1="220" x2="280" y2="260"/>
  <!-- wardrobe partition (dashed) -->
  <line class="partition" x1="280" y1="280" x2="380" y2="280"/>
  <!-- toilet -->
  <ellipse class="fix" cx="195" cy="180" rx="14" ry="20"/>
  <rect class="fix" x="178" y="155" width="34" height="15"/>
  <!-- sink -->
  <rect class="fix" x="170" y="220" width="50" height="32" rx="3"/>
  <circle class="fix" cx="195" cy="236" r="3"/>
  <!-- shower -->
  <rect class="fix" x="230" y="155" width="40" height="100" rx="2"/>
  <line class="fix" x1="240" y1="195" x2="260" y2="215"/>
  <line class="fix" x1="260" y1="195" x2="240" y2="215"/>
  <!-- kitchen along left wall -->
  <rect class="fur" x="155" y="350" width="55" height="180"/>
  <line class="fix" x1="160" y1="410" x2="205" y2="410"/>
  <rect class="fix" x="165" y="370" width="35" height="30" rx="2"/>
  <circle class="fix" cx="175" cy="450" r="6"/>
  <circle class="fix" cx="195" cy="450" r="6"/>
  <circle class="fix" cx="175" cy="475" r="6"/>
  <circle class="fix" cx="195" cy="475" r="6"/>
  <!-- bed -->
  <rect class="fur" x="270" y="540" width="160" height="100" rx="3"/>
  <rect class="fix" x="280" y="555" width="60" height="20" rx="2"/>
  <rect class="fix" x="350" y="555" width="60" height="20" rx="2"/>
  <!-- table -->
  <rect class="fur" x="270" y="380" width="120" height="60" rx="3"/>
  <!-- window south -->
  <line class="fix" x1="170" y1="720" x2="430" y2="720" stroke-width="2.5"/>
  <line class="fix" x1="170" y1="722" x2="430" y2="722" stroke-width="2"/>
  <!-- area labels -->
  <text class="lbl" x="200" y="245" text-anchor="middle">3.03 м²</text>
  <text class="sub" x="200" y="262" text-anchor="middle">САНУЗЕЛ</text>
  <text class="lbl" x="330" y="190" text-anchor="middle">2.67 м²</text>
  <text class="sub" x="330" y="207" text-anchor="middle">ПРИХОЖАЯ</text>
  <text class="lbl" x="330" y="320" text-anchor="middle">5.15 м²</text>
  <text class="sub" x="330" y="337" text-anchor="middle">ГАРДЕРОБ</text>
  <text class="lbl" x="320" y="495" text-anchor="middle">7.64 м²</text>
  <text class="sub" x="320" y="513" text-anchor="middle">КУХНЯ-ГОСТИНАЯ</text>
  <!-- footer -->
  <text class="corp" x="300" y="765" text-anchor="middle">КОРПУС 1.3 · СТУДИЯ 18.49 м² · «Метр² Под Ключ»</text>
</svg>
